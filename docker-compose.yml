services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5434:5432"
    volumes:
      - relay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 2s
      timeout: 2s
      retries: 20

  nats:
    image: nats:2.10-alpine
    container_name: relay-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - relay_natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q ok"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - relay_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: relay-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: relay
      CLICKHOUSE_PASSWORD: relay
      CLICKHOUSE_DB: relay
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native TCP
    volumes:
      - relay_chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  relay_pgdata:
  relay_natsdata:
  relay_redisdata:
  relay_chdata:
